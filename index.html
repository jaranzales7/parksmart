<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ParkSmart MVC</title>

    <link rel="stylesheet" href="./css/styles.css">

</head>

<body>

    <div class="container">

        <h1>ParkSmart</h1>

        <form id="formVehiculo">

            <input
                type="text"
                id="placa"
                placeholder="Placa"
                required
            >

            <input
                type="text"
                id="propietario"
                placeholder="Propietario"
                required
            >

            <input
                type="number"
                id="horas"
                placeholder="Horas"
                required
            >

            <select id="tipoVehiculo" required>

                <option value="">
                    Seleccione
                </option>

                <option value="M">
                    Moto
                </option>

                <option value="C">
                    Carro
                </option>

                <option value="K">
                    Camioneta
                </option>

                <option value="B">
                    Bus
                </option>

            </select>

            <button type="submit">
                Registrar
            </button>

        </form>

        <h2>Vehículos Registrados</h2>

        <table>

            <thead>

                <tr>

                    <th>Placa</th>
                    <th>Propietario</th>
                    <th>Tipo</th>
                    <th>Horas</th>
                    <th>Total</th>

                </tr>

            </thead>

            <tbody id="tablaVehiculos">

            </tbody>

        </table>

        <h2 id="recaudoTotal">
            Total Recaudado: $0
        </h2>

    </div>


    <!-- models -->

    <script src="./models/Vehiculo.js"></script>

    <script src="./models/Moto.js"></script>

    <script src="./models/Carro.js"></script>

    <script src="./models/Camioneta.js"></script>

    <script src="./models/Bus.js"></script>


    <!-- views -->

    <script src="./views/interfaz.js"></script>


    <!-- controllers -->

    <script src="./controllers/vehiculoController.js"></script>


    <!-- app -->

    <script src="./js/app.js"></script>

</body>

</html>
